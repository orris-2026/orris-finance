<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>بوابة أورس المالية — Live</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
<script>
  if (typeof msal === 'undefined') {
    document.write('<script src="https://unpkg.com/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"><\/script>');
  }
</script>
<script>
  if (typeof msal === 'undefined') {
    document.write('<script src="https://alcdn.msftauth.net/browser/2.38.3/js/msal-browser.min.js"><\/script>');
  }
</script>
<style>
:root {
  --bg:#08072A; --card:#0f0e35; --panel:#13123d; --border:rgba(155,127,232,0.18);
  --green:#00ff9d; --purple:#9b7fe8; --blue:#4fc3f7; --orange:#ff9f43; --red:#ff6b6b;
  --text:#ffffff; --muted:#8888bb; --sidebar:250px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.num{font-family:'Inter',sans-serif;direction:ltr;}

/* ===== Login Screen ===== */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:24px;}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:48px 56px;text-align:center;max-width:420px;}
.login-logo{font-size:26px;font-weight:900;margin-bottom:8px;}
.login-logo span{color:var(--green);}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:28px;}
.login-btn{background:linear-gradient(90deg,var(--green),var(--blue));border:none;color:#08072A;font-weight:800;
  padding:14px 32px;border-radius:12px;font-size:14px;cursor:pointer;font-family:'Cairo',sans-serif;transition:.2s;}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 10px 24px -8px rgba(0,255,157,0.5);}
.login-status{font-size:12px;color:var(--muted);margin-top:16px;min-height:18px;}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.2);border-top-color:var(--green);
  border-radius:50%;display:inline-block;animation:spin 0.8s linear infinite;vertical-align:middle;margin-left:8px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ===== Dashboard shell ===== */
#dashboardApp{display:none;}
.sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--card);border-left:1px solid var(--border);
  display:flex;flex-direction:column;position:fixed;right:0;top:0;bottom:0;z-index:100;}
.sidebar-logo{padding:20px 16px 14px;border-bottom:1px solid var(--border);}
.logo-main{font-size:16px;font-weight:900;color:var(--green);}
.logo-sub{font-size:10px;color:var(--purple);margin-top:4px;}
.nav{flex:1;padding:10px 8px;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;cursor:pointer;
  font-size:11.5px;color:var(--muted);margin-bottom:1px;transition:all .15s;font-weight:600;}
.nav-item:hover{color:var(--text);background:rgba(155,127,232,0.08);}
.nav-item.active{color:var(--green);background:rgba(0,255,157,0.07);}
.sidebar-footer{padding:14px 16px;border-top:1px solid var(--border);font-size:10px;color:var(--muted);line-height:1.7;}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;display:inline-block;margin-left:5px;
  box-shadow:0 0 6px var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.logout-btn{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);color:var(--red);
  border-radius:8px;padding:6px 10px;font-size:10.5px;cursor:pointer;font-family:'Cairo',sans-serif;margin-top:8px;width:100%;}

.main{margin-right:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--border);
  background:rgba(8,7,42,0.9);backdrop-filter:blur(8px);position:sticky;top:0;z-index:50;}
.topbar-title{font-size:17px;font-weight:700;}
.topbar-title span{color:var(--green);}
.refresh-btn{background:rgba(0,255,157,0.12);border:1px solid rgba(0,255,157,0.3);color:var(--green);border-radius:8px;
  padding:7px 16px;font-size:12px;cursor:pointer;font-family:'Cairo',sans-serif;font-weight:700;}
.refresh-btn:disabled{opacity:0.5;cursor:not-allowed;}
.content{padding:22px 28px;flex:1;}
.page{display:none;}
.page.active{display:block;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.page-header{margin-bottom:16px;}
.page-header h2{font-size:19px;font-weight:900;margin-bottom:4px;}
.page-header p{font-size:12px;color:var(--muted);}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:16px 18px;position:relative;overflow:hidden;}
.kpi-card::before{content:'';position:absolute;top:0;right:0;width:3px;height:100%;background:var(--accent,var(--blue));opacity:.7;}
.kpi-card.green{--accent:#00ff9d;} .kpi-card.blue{--accent:#4fc3f7;}
.kpi-card.orange{--accent:#ff9f43;} .kpi-card.red{--accent:#ff6b6b;} .kpi-card.purple{--accent:#9b7fe8;}
.kpi-label{font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:600;}
.kpi-value{font-size:20px;font-weight:900;font-family:'Inter',sans-serif;direction:ltr;}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:5px;}

.section-title{font-size:14px;font-weight:800;margin:22px 0 12px;display:flex;align-items:center;gap:7px;}
.section-title .dot{width:6px;height:6px;background:var(--green);border-radius:50%;box-shadow:0 0 8px var(--green);}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:18px;}
.chart-title{font-size:13px;font-weight:700;margin-bottom:3px;}
.chart-sub{font-size:10.5px;color:var(--muted);margin-bottom:14px;}
.charts-row{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;align-items:start;}
.charts-row.even{grid-template-columns:1fr 1fr;}

.table-card{background:var(--panel);border:1px solid var(--border);border-radius:13px;padding:4px;margin-bottom:18px;}
.table-header{padding:12px 16px 8px;}
.table-title{font-size:12.5px;font-weight:700;}
.table-scroll{overflow-x:auto;max-height:520px;overflow-y:auto;}
table{width:100%;border-collapse:collapse;min-width:560px;}
th{font-size:9.5px;color:var(--muted);font-weight:700;padding:8px 9px;text-align:center;border-bottom:1px solid var(--border);
  font-family:'Inter',sans-serif;text-transform:uppercase;position:sticky;top:0;background:var(--panel);}
th:first-child{text-align:right;}
td{font-size:11.5px;padding:8px 9px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.04);white-space:nowrap;}
td:first-child{text-align:right;}
tr:hover td{background:rgba(155,127,232,0.04);}
.pos{color:var(--green);font-weight:700;} .neg{color:var(--red);font-weight:700;} .warn{color:var(--orange);font-weight:700;}
.muted-td{color:var(--muted);}
.badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:9.5px;font-weight:700;}
.badge.active{background:rgba(0,255,157,0.12);color:var(--green);}
.badge.warn{background:rgba(255,159,67,0.12);color:var(--orange);}
.badge.error{background:rgba(255,107,107,0.12);color:var(--red);}
.analysis-box{background:rgba(155,127,232,0.06);border:1px solid rgba(155,127,232,0.2);border-radius:12px;
  padding:14px 18px;margin-bottom:14px;font-size:12px;color:#d5d5f0;line-height:1.9;}
.analysis-box b{color:var(--green);}
.alert-box{background:rgba(255,159,67,0.08);border:1px solid rgba(255,159,67,0.3);border-radius:12px;padding:13px 18px;
  font-size:11.5px;color:#ffd9ad;margin-bottom:16px;}
.alert-box.red{background:rgba(255,107,107,0.08);border-color:rgba(255,107,107,0.3);color:#ffc2c2;}
.loading-overlay{position:fixed;inset:0;background:rgba(8,7,42,0.85);display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:14px;z-index:999;font-size:13px;color:var(--muted);}
.error-box{background:rgba(255,107,107,0.1);border:1px solid var(--red);border-radius:12px;padding:16px 20px;
  color:#ffc2c2;font-size:12.5px;margin:20px;}
.donut-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.donut-legend{flex:1;display:flex;flex-direction:column;gap:8px;min-width:140px;}
.legend-item{display:flex;align-items:center;gap:8px;font-size:11.5px;color:#c7c7e8;}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.legend-val{margin-right:auto;font-family:'Inter',sans-serif;font-weight:700;}
::-webkit-scrollbar{width:5px;height:5px;} ::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
@media (max-width:1100px){.kpi-grid{grid-template-columns:repeat(2,1fr);} .charts-row,.charts-row.even{grid-template-columns:1fr;}}

.ichart{width:100%;height:auto;display:block;}
.ichart .gbar,.ichart .gauge-arc,.ichart .cchart-bar{cursor:pointer;transition:filter .15s;}
.ichart .gbar:hover{filter:drop-shadow(0 0 8px #00ff9d);}
.ichart .gauge-arc:hover{filter:drop-shadow(0 0 10px currentColor) brightness(1.3)!important;}
.ichart .cchart-bar:hover{filter:drop-shadow(0 0 8px #9b7fe8);opacity:.9;}
.ichart .achart-dot:hover,.ichart .cchart-dot:hover{filter:drop-shadow(0 0 8px #fff);}

.reco-box{background:rgba(0,255,157,0.05);border:1px solid rgba(0,255,157,0.2);border-radius:12px;padding:14px 18px;
  margin-bottom:18px;font-size:12px;color:#c9f2df;line-height:1.9;}
.reco-box .label{font-size:10.5px;color:var(--green);font-weight:800;margin-bottom:6px;display:block;}
.analysis-box .label{font-size:10.5px;color:var(--purple);font-weight:800;margin-bottom:6px;display:block;}

.health-score-badge{background:rgba(255,255,255,0.03);border:2px solid var(--border);border-radius:16px;padding:12px 22px;text-align:center;min-width:150px;}
.health-score-val{font-family:'Inter',sans-serif;font-size:30px;font-weight:900;direction:ltr;}
.health-score-lbl{font-size:10px;color:var(--muted);margin-top:4px;}

.alerts-panel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:6px 20px;margin-bottom:20px;}
.alert-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12px;color:#d5d5f0;}
.alert-row:last-child{border-bottom:none;}

.snapshot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.snap-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.snap-card::before{content:'';position:absolute;top:0;right:0;width:3px;height:100%;background:var(--snap-color,#00ff9d);box-shadow:0 0 12px var(--snap-color,#00ff9d);opacity:.7;}
.snap-card:hover{border-color:var(--snap-color,#00ff9d);transform:translateY(-3px);box-shadow:0 10px 28px -8px var(--snap-color,rgba(0,255,157,.45));}
.snap-title{font-size:11.5px;font-weight:700;color:var(--purple);margin-bottom:6px;}
.snap-val{font-size:12px;color:var(--text);}

.mini-insight{margin-top:16px;padding-top:14px;border-top:1px solid var(--border);}
.mini-insight-row{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);padding:5px 0;}
.mini-insight-row .pos{color:var(--green);font-weight:700;}

.accordion-item{background:var(--panel);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.accordion-head{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-weight:700;font-size:12.5px;}
.accordion-head:hover{background:rgba(155,127,232,0.05);}
.accordion-head .chev{transition:transform .25s;color:var(--muted);}
.accordion-item.open .chev{transform:rotate(180deg);}
.accordion-body{max-height:0;overflow:hidden;transition:max-height .35s ease;}
.accordion-item.open .accordion-body{max-height:3000px;}
.accordion-body-inner{padding:0 18px 16px;}
@media (max-width:1100px){.snapshot-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<!-- ============ LOGIN SCREEN ============ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">ORRIS <span>FINANCE</span></div>
    <div class="login-sub">بوابة أورس المالية — مربوطة مباشرة بـ OneDrive</div>
    <button class="login-btn" id="loginBtn" onclick="signIn()">🔐 تسجيل الدخول بحساب مايكروسوفت</button>
    <div class="login-status" id="loginStatus"></div>
  </div>
</div>

<!-- ============ DASHBOARD APP ============ -->
<div id="dashboardApp">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-main">ORRIS FINANCE</div>
      <div class="logo-sub">بوابة أورس المالية</div>
    </div>
    <nav class="nav" id="navContainer"></nav>
    <div class="sidebar-footer">
      <div><span class="live-dot"></span>مربوط حياً بـ OneDrive</div>
      <div id="lastSync">آخر تحديث: —</div>
      <button class="logout-btn" onclick="signOut()">تسجيل الخروج</button>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div class="topbar-title">بوابة <span>أورس</span> المالية</div>
      <button class="refresh-btn" id="refreshBtn" onclick="loadAllData()">🔄 تحديث الأرقام الآن</button>
    </div>
    <div class="content" id="contentContainer">
      <div class="loading-overlay" id="dataLoadingOverlay">
        <div class="spinner" style="width:32px;height:32px;"></div>
        <div>جاري قراءة الإكسل من OneDrive...</div>
      </div>
    </div>
  </main>
</div>

<script>
// ============================================================
// CONFIGURATION
// ============================================================
const msalConfig = {
  auth: {
    clientId: "45eef816-effc-47db-90a6-3f9be6379bfe",
    authority: "https://login.microsoftonline.com/cd40b3cd-1ad9-4a55-9787-54f62376d841",
    redirectUri: "https://orris-2026.github.io/orris-finance/"
  },
  cache: { cacheLocation: "sessionStorage" }
};
const loginRequest = { scopes: ["Files.Read", "Files.Read.All", "User.Read"] };
const EXCEL_FILE_PATH = "/new final finance reports orris event/new_orris_events_reports_final.xlsx"; // path in OneDrive — adjust if it changes

let orrisMsalApp = null;
let msalReady = null; // promise that resolves once MSAL is initialized
let accessToken = null;
let fileId = null;
let D = {}; // global data store

// ============================================================
// AUTH
// ============================================================
function ensureMsal() {
  if (!msalReady) {
    msalReady = (async () => {
      orrisMsalApp = new msal.PublicClientApplication(msalConfig);
      await orrisMsalApp.initialize();
      return orrisMsalApp;
    })();
  }
  return msalReady;
}

async function signIn() {
  document.getElementById('loginStatus').innerHTML = 'جاري تسجيل الدخول... <span class="spinner"></span>';
  if (typeof msal === 'undefined') {
    document.getElementById('loginStatus').innerHTML =
      '⚠️ مكتبة MSAL ما تحمّلت من الإنترنت. جرب تحديث الصفحة (Ctrl+Shift+R) أو تحقق من الاتصال.';
    return;
  }
  try {
    const app = await ensureMsal();
    const result = await app.loginPopup(loginRequest);
    app.setActiveAccount(result.account);
    await afterLogin();
  } catch (e) {
    document.getElementById('loginStatus').textContent = 'خطأ بتسجيل الدخول: ' + e.message;
    console.error(e);
  }
}

async function signOut() {
  const app = await ensureMsal();
  app.logoutPopup();
  location.reload();
}

async function getToken() {
  const app = await ensureMsal();
  const account = app.getActiveAccount();
  try {
    const result = await app.acquireTokenSilent({ ...loginRequest, account });
    return result.accessToken;
  } catch {
    const result = await app.acquireTokenPopup(loginRequest);
    return result.accessToken;
  }
}

async function afterLogin() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboardApp').style.display = 'block';
  accessToken = await getToken();
  buildNav();
  await loadAllData();
}

// try silent SSO on page load
window.addEventListener('load', async () => {
  if (typeof msal === 'undefined') {
    document.getElementById('loginStatus').innerHTML =
      '⚠️ فشل تحميل مكتبة MSAL — تحقق من الاتصال بالإنترنت أو أن الشبكة/المتصفح لا يحجب alcdn.msauth.net';
    return;
  }
  try {
    const app = await ensureMsal();
    const accounts = app.getAllAccounts();
    if (accounts.length > 0) {
      app.setActiveAccount(accounts[0]);
      await afterLogin();
    }
  } catch(e) { console.log('Silent login skipped:', e.message); }
});

// ============================================================
// GRAPH API — fetch Excel ranges
// ============================================================
async function graphFetch(url) {
  const res = await fetch(url, { headers: { Authorization: `Bearer ${accessToken}` } });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Graph API error ${res.status}: ${err}`);
  }
  return res.json();
}

async function resolveFileId() {
  const encodedPath = EXCEL_FILE_PATH.split('/').map(seg => encodeURIComponent(seg)).join('/');
  const data = await graphFetch(`https://graph.microsoft.com/v1.0/me/drive/root:${encodedPath}`);
  return data.id;
}

async function getUsedRange(sheetName) {
  const url = `https://graph.microsoft.com/v1.0/me/drive/items/${fileId}/workbook/worksheets('${encodeURIComponent(sheetName)}')/usedRange(valuesOnly=true)`;
  const data = await graphFetch(url);
  return data.values; // 2D array
}

// ============================================================
// DATA LOADING & PROCESSING
// ============================================================
async function loadAllData() {
  const overlay = document.getElementById('dataLoadingOverlay');
  const refreshBtn = document.getElementById('refreshBtn');
  overlay.style.display = 'flex';
  if (refreshBtn) refreshBtn.disabled = true;
  try {
    if (!fileId) fileId = await resolveFileId();

    const [client, supp, sales, projects, dept, cash, income, fixed, sched, subs, budget, partner, realBudget, ratios] = await Promise.all([
      getUsedRange('CLIENT'),
      getUsedRange('SUPP'),
      getUsedRange('SALES'),
      getUsedRange('PROJECTS STATMENT'),
      getUsedRange('DEPARTMENTAL REPORTS'),
      getUsedRange('CASH'),
      getUsedRange('INCOME STATMENTS'),
      getUsedRange('Fixed monthly payments '),
      getUsedRange('Scheduled Payments Report'),
      getUsedRange('Subscriptions Tracker'),
      getUsedRange('2026 BUDGET'),
      getUsedRange('PARTNER&SISTER COMPANY'),
      getUsedRange('REAL INC&BUDGET'),
      getUsedRange('Financial ratios'),
    ]);

    processData({ client, supp, sales, projects, dept, cash, income, fixed, sched, subs, budget, partner, realBudget, ratios });
    document.getElementById('lastSync').textContent = 'آخر تحديث: ' + new Date().toLocaleString('ar-SA');
    renderPage(currentPage || 'overview');
  } catch (e) {
    document.getElementById('contentContainer').innerHTML =
      `<div class="error-box">⚠️ فشل تحميل البيانات من OneDrive.<br/><br/>
       <b>السبب:</b> ${e.message}<br/><br/>
       تأكد أن:<br/>
       1. اسم الملف بالإكسل مطابق تماماً لـ <code>${EXCEL_FILE_PATH}</code> بجذر OneDrive (أو عدّل المسار بالكود)<br/>
       2. أسماء الشيتات بالإكسل مطابقة (CLIENT, SUPP, SALES, PROJECTS STATMENT, DEPARTMENTAL REPORTS, CASH, INCOME STATMENTS...)<br/>
       3. صلاحيات Files.Read بالتطبيق مفعّلة وموافق عليها (admin consent)
       </div>`;
    console.error(e);
  } finally {
    overlay.style.display = 'none';
    if (refreshBtn) refreshBtn.disabled = false;
  }
}

function num(v) { return typeof v === 'number' ? v : (parseFloat(v) || 0); }
function fmt(n, dec=0) { if(n==null||isNaN(n)) return '—'; return n.toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec}); }
function pct(n, d=1) { if(n==null||isNaN(n)) return '—'; return n.toFixed(d)+'%'; }

// ============================================================
// CHART GENERATORS (ported from Python ichart.py — same visual language)
// ============================================================
function glowBars(items, opts={}) {
  const width = opts.width || 460, color1 = opts.color1 || '#9b7fe8', color2 = opts.color2 || '#00ff9d';
  const fmtFn = opts.fmt || (v => fmt(v));
  const maxv = Math.max(...items.map(i=>i[1]), 1);
  const labelW = 150, rowH = 34;
  const trackW = width - labelW - 80;
  const uid = 'g'+Math.random().toString(36).slice(2,8);
  let y=0, rows='';
  items.forEach(([label,value]) => {
    const w = Math.max(value/maxv*trackW, 3);
    rows += `<text x="${labelW-8}" y="${y+rowH/2+4}" text-anchor="end" font-size="11.5" fill="#c7c7e8" font-family="Cairo">${label}</text>
      <rect x="${labelW}" y="${y+8}" width="${trackW}" height="14" rx="7" fill="rgba(255,255,255,0.05)"/>
      <rect x="${labelW}" y="${y+8}" width="${w}" height="14" rx="7" fill="url(#gg-${uid})" class="gbar"/>
      <text x="${labelW+trackW+10}" y="${y+rowH/2+4}" font-size="11" fill="#fff" font-family="Inter" font-weight="700">${fmtFn(value)}</text>`;
    y += rowH;
  });
  return `<svg width="${width}" height="${y}" viewBox="0 0 ${width} ${y}" class="ichart">
    <defs><linearGradient id="gg-${uid}" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="${color1}"/><stop offset="100%" stop-color="${color2}"/></linearGradient></defs>
    ${rows}</svg>`;
}

function areaGlowChart(labels, values, opts={}) {
  const width = opts.width||520, height = opts.height||210;
  const fmtFn = opts.fmt || (v=>fmt(v));
  const minv = Math.min(...values), maxv = Math.max(...values);
  const rangev = (maxv-minv)||1, pad=22, n=values.length;
  const uid = 'a'+Math.random().toString(36).slice(2,8);
  const xy = (i,v) => [pad + i*(width-2*pad)/(n-1||1), pad + (1-(v-minv)/rangev)*(height-2*pad-22)];
  const pts = values.map((v,i)=>xy(i,v));
  const path = 'M ' + pts.map(p=>p.join(',')).join(' L ');
  const area = path + ` L ${pts[pts.length-1][0]},${height-22} L ${pts[0][0]},${height-22} Z`;
  const dots = pts.map((p,i)=>`<circle cx="${p[0]}" cy="${p[1]}" r="4" fill="#08072A" stroke="#fff" stroke-width="2" class="achart-dot"/>`).join('');
  const vlabels = pts.map((p,i)=>`<text x="${p[0]}" y="${p[1]-10}" text-anchor="middle" font-size="9.5" fill="#fff" font-family="Inter" font-weight="700">${fmtFn(values[i])}</text>`).join('');
  const labs = pts.map((p,i)=>`<text x="${p[0]}" y="${height-6}" text-anchor="middle" font-size="10" fill="#8888bb" font-family="Inter">${labels[i]}</text>`).join('');
  return `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" class="ichart">
    <defs><linearGradient id="ag-${uid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#69C9F2" stop-opacity="0.35"/><stop offset="100%" stop-color="#69C9F2" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#ag-${uid})"/>
    <path d="${path}" fill="none" stroke="#fff" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round" style="filter:drop-shadow(0 0 5px rgba(255,255,255,0.6))"/>
    ${dots}${vlabels}${labs}</svg>`;
}

function multiGauge(items, opts={}) {
  const size = opts.size||110;
  const gap=20, n=items.length;
  const totalW = size*n + gap*(n-1);
  let svgs='';
  items.forEach(([label,pctVal,color],i)=>{
    const r=(size-16)/2, cx=size/2, cy=size/2, circ=2*Math.PI*r;
    const dash = Math.min(Math.abs(pctVal),100)/100*circ;
    const xOff = i*(size+gap);
    svgs += `<g transform="translate(${xOff},0)">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="9"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="9" stroke-dasharray="${dash} ${circ-dash}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})" class="gauge-arc" style="filter:drop-shadow(0 0 4px ${color});"/>
      <text x="${cx}" y="${cy-1}" text-anchor="middle" fill="#fff" font-size="15" font-weight="900" font-family="Inter">${pctVal.toFixed(0)}%</text>
      <text x="${cx}" y="${size-2}" text-anchor="middle" fill="#8888bb" font-size="9" font-family="Cairo">${label}</text>
    </g>`;
  });
  return `<svg width="${totalW}" height="${size+6}" viewBox="0 0 ${totalW} ${size+6}" class="ichart">${svgs}</svg>`;
}

function radarChart(axes, actual, target, opts={}) {
  const size = opts.size||280, n=axes.length, cx=size/2, cy=size/2, r=size/2-40;
  const point = (i,val) => { const a=-Math.PI/2+i*2*Math.PI/n, rad=r*Math.min(val,100)/100; return [cx+rad*Math.cos(a), cy+rad*Math.sin(a)]; };
  const labelPoint = (i) => { const a=-Math.PI/2+i*2*Math.PI/n, rad=r+26; return [cx+rad*Math.cos(a), cy+rad*Math.sin(a)]; };
  let rings='';
  [0.25,0.5,0.75,1.0].forEach(frac=>{
    const pts = axes.map((_,i)=>point(i,frac*100));
    rings += `<path d="M ${pts.map(p=>p.join(',')).join(' L ')} Z" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>`;
  });
  const axisLines = axes.map((_,i)=>{ const p=point(i,100); return `<line x1="${cx}" y1="${cy}" x2="${p[0]}" y2="${p[1]}" stroke="rgba(255,255,255,0.06)"/>`; }).join('');
  const labels = axes.map((ax,i)=>{ const p=labelPoint(i); return `<text x="${p[0]}" y="${p[1]}" text-anchor="middle" font-size="10" fill="#c7c7e8" font-family="Cairo">${ax}</text>`; }).join('');
  const apts = actual.map((v,i)=>point(i,v));
  const ad = `M ${apts.map(p=>p.join(',')).join(' L ')} Z`;
  const adots = apts.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="3.5" fill="#00ff9d"/>`).join('');
  const tpts = target.map((v,i)=>point(i,v));
  const td = `M ${tpts.map(p=>p.join(',')).join(' L ')} Z`;
  const tdots = tpts.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="none" stroke="#9b7fe8" stroke-width="2"/>`).join('');
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="ichart">
    ${rings}${axisLines}
    <path d="${td}" fill="rgba(155,127,232,0.08)" stroke="#9b7fe8" stroke-width="1.5" stroke-dasharray="4 3"/>${tdots}
    <path d="${ad}" fill="rgba(0,255,157,0.14)" stroke="#00ff9d" stroke-width="2" style="filter:drop-shadow(0 0 4px #00ff9d);"/>${adots}
    ${labels}</svg>`;
}

function comboChart(labels, actual, target, opts={}) {
  const width=opts.width||1000, height=opts.height||230;
  const maxv = Math.max(...actual, ...target, 1);
  const n=labels.length, padL=10,padR=10,padT=20,padB=30;
  const plotW=width-padL-padR, plotH=height-padT-padB;
  const bw=plotW/n*0.5, step=plotW/n;
  const uid='c'+Math.random().toString(36).slice(2,8);
  let bars='', linePts=[];
  for(let i=0;i<n;i++){
    const x=padL+i*step+(step-bw)/2, bh=actual[i]/maxv*plotH, y=padT+plotH-bh;
    bars += `<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="4" fill="url(#grad-${uid})" class="cchart-bar"/>`;
    const lx=padL+i*step+step/2, ly=padT+plotH-target[i]/maxv*plotH;
    linePts.push([lx,ly]);
    bars += `<text x="${x+bw/2}" y="${height-10}" text-anchor="middle" font-size="10" fill="#8888bb" font-family="Inter">${labels[i]}</text>`;
  }
  const linePath = 'M ' + linePts.map(p=>p.join(',')).join(' L ');
  const dots = linePts.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="4.5" fill="#08072A" stroke="#00ff9d" stroke-width="2.5" class="cchart-dot"/>`).join('');
  return `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" class="ichart">
    <defs><linearGradient id="grad-${uid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#9b7fe8"/><stop offset="100%" stop-color="#4fc3f7"/></linearGradient></defs>
    ${bars}<path d="${linePath}" fill="none" stroke="#00ff9d" stroke-width="2.5" stroke-linecap="round" style="filter:drop-shadow(0 0 4px #00ff9d)"/>${dots}</svg>`;
}

function parseExcelDate(v) {
  if (v == null) return null;
  if (typeof v === 'string') { const d = new Date(v); return isNaN(d) ? null : d; }
  if (typeof v === 'number') {
    // Excel serial date to JS Date
    return new Date(Math.round((v - 25569) * 86400 * 1000));
  }
  return null;
}
function agingBucket(days) {
  if (days == null) return 'غير محدد';
  if (days <= 30) return '0-30';
  if (days <= 60) return '31-60';
  if (days <= 90) return '61-90';
  return '90+';
}
const TODAY = new Date('2026-07-16');

function processData(raw) {
  // ---- CLIENT ---- headers at row index1 (0-based), data from row2
  const client = raw.client;
  let receivables_total=0, receivables_paid=0, receivables_remaining=0;
  const clientRows = [];
  for (let i=2; i<client.length; i++) {
    const row = client[i];
    if (!row[1]) continue;
    const amt = num(row[7]), paid = num(row[8]), rem = num(row[9]);
    if (!amt) continue;
    receivables_total += amt; receivables_paid += paid; receivables_remaining += rem;
    const invDate = parseExcelDate(row[6]);
    const days = invDate ? Math.round((TODAY-invDate)/86400000) : null;
    clientRows.push({client:row[1], proj:row[2], amt, paid, rem, days, bucket: rem>0 ? agingBucket(days) : 'مسدد بالكامل'});
  }

  // ---- SUPP ----
  const supp = raw.supp;
  let payables_total=0, payables_paid=0, payables_remaining=0;
  const suppRows = [];
  for (let i=1; i<supp.length; i++) {
    const row = supp[i];
    if (!row[2]) continue;
    const agreed = num(row[11]), paid = num(row[12]), rem = num(row[13]);
    if (!agreed && !paid) continue;
    payables_total += agreed; payables_paid += paid; payables_remaining += rem;
    const invDate = parseExcelDate(row[1]);
    const days = invDate ? Math.round((TODAY-invDate)/86400000) : null;
    suppRows.push({name:row[2], agreed, paid, rem, days, bucket: rem>0 ? agingBucket(days) : 'مسدد بالكامل'});
  }

  // ---- SALES ----
  const sales = raw.sales;
  let sales_pre_vat=0, sales_vat=0, sales_incl_vat=0, sales_paid=0;
  const salesRows = [];
  for (let i=2; i<sales.length; i++) {
    const row = sales[i];
    if (!row[2]) continue;
    const preVat = num(row[8]), vat = num(row[9]), total = num(row[10]), paid = num(row[11]);
    if (!preVat && !total) continue;
    sales_pre_vat += preVat; sales_vat += vat; sales_incl_vat += total; sales_paid += paid;
    salesRows.push({inv:row[2], client:row[3], proj:row[4], preVat, vat, total, paid, salesman:row[14]});
  }

  // ---- PROJECTS STATMENT ----
  const projects = raw.projects;
  let projects_revenue=0, projects_admin=0, projects_op=0, projects_net=0;
  const projRows = [];
  for (let i=3; i<projects.length; i++) {
    const row = projects[i];
    if (!row[2] || row[0]==='total') continue;
    const rev = num(row[3]), admin = num(row[4]), op = num(row[5]), other = num(row[6]);
    if (!rev) continue;
    const net = rev - admin - op + other;
    projects_revenue += rev; projects_admin += admin; projects_op += op; projects_net += net;
    projRows.push({name:row[2], client:row[1], rev, admin, op, net});
  }
  projRows.sort((a,b)=>b.rev-a.rev);

  // ---- DEPARTMENTAL REPORTS ----
  const dept = raw.dept;
  let headcount=0, payroll_monthly=0, payroll_yearly=0;
  const deptRows = [];
  for (let i=4; i<dept.length; i++) {
    const row = dept[i];
    if (!row[1] || row[1]==='TOTAL') continue;
    const sal = num(row[11]), mc = num(row[21]), yc = num(row[22]);
    if (!sal && !mc) continue;
    headcount++; payroll_monthly += mc; payroll_yearly += yc;
    deptRows.push({name:row[1], job:row[2], dept:row[3], sal, mc, yc});
  }

  // ---- CASH ----
  const cash = raw.cash;
  const cashMonths = cash[7] ? cash[7].slice(1,13) : [];
  const cashEnd = cash[14] ? cash[14].slice(1,13).map(num) : [];
  const bankBalance = cash[4] ? num(cash[4][6]) : 0;
  const arBalance = cash[4] ? num(cash[4][9]) : 0;

  // ---- INCOME STATMENTS (find 'total' column + month columns dynamically) ----
  const income = raw.income;
  let totalCol = -1;
  const monthCols = []; // [{col, label}]
  if (income[3]) {
    for (let c=0; c<income[3].length; c++) {
      if (income[3][c]==='total') totalCol=c;
    }
  }
  if (income[3]) {
    for (let c=13; c<(totalCol>=0?totalCol:income[3].length); c++) {
      const h = income[3][c];
      if (h && typeof h !== 'string') { // date-like header
        const d = parseExcelDate(h);
        if (d) monthCols.push({col:c, label: d.toLocaleDateString('ar-SA',{month:'long'})});
      }
    }
  }
  function extractISLines(startRow, endRow) {
    const items = [];
    let total=0;
    for (let i=startRow; i<=endRow && i<income.length; i++) {
      const row = income[i];
      const name = row[12];
      const val = totalCol>=0 ? num(row[totalCol]) : 0;
      if (!name || !val) continue;
      const monthly = monthCols.map(mc => num(row[mc.col]));
      items.push({name: String(name).trim(), monthly, total: val});
      total += val;
    }
    return {items, total};
  }
  const isRev = extractISLines(4,11);
  const isCogs = extractISLines(13,49);
  const isAdmin = extractISLines(53,104);
  const is_revenue = isRev.total, is_cogs = isCogs.total, is_admin = isAdmin.total;
  const is_gross_profit = is_revenue - is_cogs;
  const is_net_profit = is_gross_profit - is_admin;
  const cmRatio = is_revenue ? (is_revenue-is_cogs)/is_revenue : 0;
  const breakeven = cmRatio ? is_admin/cmRatio : 0;
  const isMonthLabels = monthCols.map(mc=>mc.label);
  const monthlyRevenue = monthCols.map((mc,idx) => isRev.items.reduce((s,it)=>s+it.monthly[idx],0));
  const monthlyCogs = monthCols.map((mc,idx) => isCogs.items.reduce((s,it)=>s+it.monthly[idx],0));
  const monthlyAdmin = monthCols.map((mc,idx) => isAdmin.items.reduce((s,it)=>s+it.monthly[idx],0));
  const monthlyGross = monthlyRevenue.map((r,idx)=>r-monthlyCogs[idx]);
  const monthlyNet = monthlyGross.map((g,idx)=>g-monthlyAdmin[idx]);

  // ---- Fixed Monthly Payments ----
  const fixed = raw.fixed;
  let fixedTotalRow = fixed.find(r => r[0] && String(r[0]).toUpperCase().includes('TOTAL'));
  const fixedMonthly = fixedTotalRow ? fixedTotalRow.slice(1,13).map(num) : [];

  // ---- Scheduled Payments ----
  const sched = raw.sched;
  let schedRows = [];
  for (let i=2; i<sched.length; i++) {
    const row = sched[i];
    if (!row[0] || row[0]==='TOTAL') continue;
    const total = num(row[5]), paid = num(row[6]), remaining = row[7]!=null ? num(row[7]) : (total-paid);
    if (!total && !paid) continue;
    let status = remaining<=0.01 ? 'مدفوعة بالكامل' : (paid>0 ? 'مدفوعة جزئياً' : 'غير مدفوعة');
    schedRows.push({n:row[0], proj:row[1], client:row[2], supplier:row[3], type:row[4], total, paid, remaining, status, paidDate:row[10]});
  }

  // ---- Subscriptions ----
  const subs = raw.subs;
  let subsTotal=0, subsActive=0;
  if (subs[4]) { subsTotal = num(subs[4][0]); subsActive = num(subs[4][5]); }
  const subsRows = [];
  for (let i=8; i<subs.length; i++) {
    const row = subs[i];
    if (!row[1]) continue;
    const monthly = num(row[2]), annual = num(row[3]);
    const realAnnual = monthly ? monthly*12 : annual;
    if (!monthly && !annual) continue;
    subsRows.push({name: row[1], monthly, annual, realAnnual, cycle: row[5]||(monthly?'شهري':'سنوي')});
  }
  const subsAnnualTotal = subsRows.reduce((s,r)=>s+r.realAnnual,0);

  // ---- Fixed Monthly Payments (item-level) ----
  const fixedItemRows = [];
  for (let i=0; i<fixed.length; i++) {
    const row = fixed[i];
    if (!row[0] || String(row[0]).toUpperCase().includes('TOTAL') || String(row[0]).toUpperCase().includes('MONTH')) continue;
    const vals = row.slice(1,13).map(num);
    const total = vals.reduce((a,b)=>a+b,0);
    if (!total) continue;
    fixedItemRows.push({label: row[0], vals, total});
  }

  // ---- 2026 BUDGET ----
  const budget = raw.budget;
  let budgetFilled = false;
  const budgetRows = [];
  if (budget) {
    for (let i=1; i<budget.length; i++) {
      const row = budget[i];
      if (!row[1]) continue;
      const b2026 = num(row[4]);
      if (b2026) budgetFilled = true;
      budgetRows.push({account: row[1], balance2025: num(row[2]), target: num(row[3]), budget2026: b2026});
    }
  }

  // ---- PARTNER & SISTER COMPANY ----
  const partner = raw.partner;
  let omqBalance=0, wsadBalance=0;
  const partnerCapital = [];
  if (partner) {
    for (let i=0; i<partner.length; i++) {
      const row = partner[i];
      if (row[1]==='TOTAL' || row[1]==='-') {
        // try to find OMQ/WSAD totals by scanning nearby label rows
      }
      if (row[5]==='TOTAL' && row[3]!=null) omqBalance = num(row[3]);
      if (row[10]==='TOTAL' && row[8]!=null) wsadBalance = num(row[8]);
    }
    // fallback: known structure — sister company totals at specific rows if scan above fails
    if (!omqBalance && partner[15]) omqBalance = num(partner[15][3]);
    if (!wsadBalance && partner[15]) wsadBalance = num(partner[15][10]);
  }

  // ---- REAL INC&BUDGET ----
  const realBudget = raw.realBudget;
  let realBudgetFilled = false;
  if (realBudget) {
    for (let i=3; i<Math.min(realBudget.length,15); i++) {
      const row = realBudget[i];
      if (row && num(row[1]) > 0) { realBudgetFilled = true; break; }
    }
  }

  // ---- Financial ratios (we compute these live ourselves, not read from sheet) ----
  const currentAssets = bankBalance + receivables_remaining;
  const currentLiabilities = payables_remaining;
  const cashRatio = currentLiabilities ? bankBalance / currentLiabilities : 0;
  const workingCapitalRatio = currentLiabilities ? currentAssets / currentLiabilities : 0;
  const workingCapitalTurnover = (currentAssets - currentLiabilities) ? sales_pre_vat / (currentAssets - currentLiabilities) : 0;

  D = {
    receivables_total, receivables_paid, receivables_remaining, clientRows,
    payables_total, payables_paid, payables_remaining, suppRows,
    sales_pre_vat, sales_vat, sales_incl_vat, sales_paid, sales_diff: sales_incl_vat-sales_paid, salesRows,
    projects_revenue, projects_admin, projects_op, projects_net, projRows,
    headcount, payroll_monthly, payroll_yearly, deptRows,
    cashMonths, cashEnd, bankBalance, arBalance,
    fixedMonthly,
    fixedItemRows,
    schedRows,
    subsTotal, subsActive, subsRows, subsAnnualTotal,
    budgetFilled, budgetRows,
    omqBalance, wsadBalance,
    realBudgetFilled,
    cashRatio, workingCapitalRatio, workingCapitalTurnover,
    grossMargin: is_revenue ? (is_revenue - is_cogs)/is_revenue*100 : 0,
    netMargin: is_revenue ? (is_revenue - is_cogs - is_admin)/is_revenue*100 : 0,
    is_revenue, is_cogs, is_admin, is_gross_profit, is_net_profit, breakeven, cmRatio,
    isMonthLabels, isRevItems: isRev.items, isCogsItems: isCogs.items, isAdminItems: isAdmin.items,
    monthlyRevenue, monthlyCogs, monthlyAdmin, monthlyGross, monthlyNet,
  };
}

  const c = document.getElementById('contentContainer');
  if (!D.receivables_total && !D.clientRows) { return; } // data not loaded yet
  if (id==='overview') c.innerHTML = renderOverview();
  else if (id==='clients') c.innerHTML = renderClients();
  else if (id==='suppliers') c.innerHTML = renderSuppliers();
  else if (id==='sales') c.innerHTML = renderSales();
  else if (id==='projects') c.innerHTML = renderProjects();
  else if (id==='dept') c.innerHTML = renderDept();
  else if (id==='cash') c.innerHTML = renderCash();
  else if (id==='scheduled') c.innerHTML = renderScheduled();
  else if (id==='budget') c.innerHTML = renderBudget();
  else if (id==='partners') c.innerHTML = renderPartners();
  else if (id==='realbudget') c.innerHTML = renderRealBudget();
  else if (id==='ratios') c.innerHTML = renderRatios();
  else if (id==='income') c.innerHTML = renderIncome();
  else if (id==='subs') c.innerHTML = renderSubs();
  else if (id==='fixed') c.innerHTML = renderFixed();
}

function renderOverview() {
  const sortedClients = D.clientRows.slice().sort((a,b)=>b.rem-a.rem);
  const top2 = sortedClients.slice(0,2);
  const conc = D.receivables_remaining ? (top2.reduce((s,c)=>s+c.rem,0) / D.receivables_remaining * 100) : 0;
  const cashRatio = D.payables_remaining ? D.bankBalance/D.payables_remaining : 0;
  const monthlyBurn = D.fixedMonthly.length ? D.fixedMonthly.reduce((a,b)=>a+b,0)/12 : 0;
  const runwayDays = monthlyBurn ? Math.round(D.bankBalance/monthlyBurn*30) : 0;
  const netMargin = D.netMargin || 0;
  const liquidityScore = Math.min(cashRatio*100,25);
  const profitScore = Math.min(netMargin/100*25,25);
  const collectionScore = D.receivables_total ? (D.receivables_paid/D.receivables_total*25) : 0;
  const concScore = (100-conc)/100*25;
  const healthScore = Math.round(liquidityScore+profitScore+collectionScore+concScore);
  const healthColor = healthScore<40?'#ff6b6b':(healthScore<65?'#ff9f43':(healthScore<85?'#4fc3f7':'#00ff9d'));
  const healthLabel = healthScore<40?'ضعيف':(healthScore<65?'متوسط':(healthScore<85?'جيد':'ممتاز'));

  const alerts = [];
  if (D.cashEnd.length && D.cashEnd[D.cashEnd.length-1]<0) alerts.push(['🔴', `الكاش يصل لرصيد سالب ${fmt(D.cashEnd[D.cashEnd.length-1])} ر.س نهاية السنة بدون تحصيلات جديدة`]);
  if (conc>50) alerts.push(['🟠', `تركز عملاء مرتفع: عميلين فقط يمثلان ${pct(conc)} من المستحقات`]);
  if (!D.budgetFilled) alerts.push(['🟠', 'شيت موازنة 2026 لا يزال فارغاً — لا يمكن قياس الفعلي مقابل المخطط']);
  const unpaidSched = D.schedRows.filter(s=>s.status==='غير مدفوعة').length;
  if (unpaidSched) alerts.push(['🟠', `${unpaidSched} دفعة مجدولة لم تُسدد بعد`]);

  const snapshots = [
    ['تقرير الإدارات والرواتب', `${D.headcount} موظف — ${fmt(D.payroll_monthly)} ر.س شهرياً`, 'dept', '#00ff9d'],
    ['العملاء', `${fmt(D.receivables_remaining)} ر.س مستحق`, 'clients', '#ff9f43'],
    ['الموردين', `${fmt(D.payables_remaining)} ر.س مستحق`, 'suppliers', '#ff6b6b'],
    ['المبيعات', `${fmt(D.sales_pre_vat)} ر.س صافي`, 'sales', '#4fc3f7'],
    ['المشاريع', `${fmt(D.projects_net)} ر.س صافي ربح`, 'projects', '#9b7fe8'],
    ['الكاش والخزينة', D.cashEnd.length?`${fmt(D.cashEnd[D.cashEnd.length-1])} ر.س متوقع`:'—', 'cash', '#ff6b6b'],
    ['الدفعات المجدولة', `${D.schedRows.length} دفعة`, 'scheduled', '#00ff9d'],
    ['النسب المالية', `هامش صافي ${pct(netMargin)}`, 'ratios', '#4fc3f7'],
    ['الشركاء والشركة الشقيقة', `رصيد OMQ ${fmt(D.omqBalance)}`, 'partners', '#9b7fe8'],
  ];

  return `
    <div class="page-header"><h2>نظرة عامة</h2><p>بيانات حية من OneDrive — ${new Date().toLocaleDateString('ar-SA')}</p></div>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;margin-bottom:18px;">
      <div class="health-score-badge" style="border-color:${healthColor};">
        <div class="health-score-val" style="color:${healthColor};">${healthScore}<span style="font-size:14px;color:var(--muted);">/100</span></div>
        <div class="health-score-lbl">مؤشر الصحة المالية — ${healthLabel}</div>
      </div>
    </div>
    ${D.cashMonths.length ? `<div class="chart-card"><div class="chart-title">التدفق النقدي المتوقع</div><div class="chart-sub">الرصيد الختامي الشهري</div>${areaGlowChart(D.cashMonths, D.cashEnd, {width:1000,height:200})}</div>` : ''}
    ${monthlyBurn ? `<div class="alert-box red"><b>⏳ عداد نفاذ السيولة:</b> بمعدل الحرق الشهري (${fmt(monthlyBurn)} ر.س)، رصيد البنك يكفي تقريباً <b style="color:#fff;">${runwayDays} يوم</b>.</div>` : ''}
    <div class="kpi-grid">
      <div class="kpi-card green"><div class="kpi-label">صافي المبيعات (بدون ضريبة)</div><div class="kpi-value">${fmt(D.sales_pre_vat)}</div></div>
      <div class="kpi-card blue"><div class="kpi-label">مستحقات العملاء</div><div class="kpi-value">${fmt(D.receivables_remaining)}</div></div>
      <div class="kpi-card orange"><div class="kpi-label">مستحقات الموردين</div><div class="kpi-value">${fmt(D.payables_remaining)}</div></div>
      <div class="kpi-card purple"><div class="kpi-label">صافي ربح المشاريع</div><div class="kpi-value">${fmt(D.projects_net)}</div></div>
    </div>
    <div class="kpi-grid">
      <div class="kpi-card blue"><div class="kpi-label">إجمالي الموظفين</div><div class="kpi-value">${D.headcount}</div></div>
      <div class="kpi-card orange"><div class="kpi-label">التكلفة الشهرية الكاملة</div><div class="kpi-value">${fmt(D.payroll_monthly)}</div></div>
      <div class="kpi-card red"><div class="kpi-label">رصيد البنك الحالي</div><div class="kpi-value">${fmt(D.bankBalance)}</div></div>
      <div class="kpi-card green"><div class="kpi-label">هامش الربح الصافي</div><div class="kpi-value">${pct(netMargin)}</div></div>
    </div>
    ${alerts.length ? `<div class="section-title"><span class="dot"></span>لوحة التنبيهات</div><div class="alerts-panel">${alerts.map(([icon,msg])=>`<div class="alert-row"><span>${icon}</span><span>${msg}</span></div>`).join('')}</div>` : ''}
    <div class="charts-row even">
      <div class="chart-card"><div class="chart-title">مكونات مؤشر الصحة المالية</div>
        ${radarChart(['السيولة','الربحية','التحصيل','تنويع العملاء'], [liquidityScore/25*100,profitScore/25*100,collectionScore/25*100,concScore/25*100], [100,100,100,100], {size:260})}
      </div>
      <div class="chart-card"><div class="chart-title">تركز العملاء</div>
        ${sortedClients.length>=2 ? glowBars([['هيئة عسير أو أكبر عميل', top2[0]?top2[0].rem:0],['ثاني أكبر عميل', top2[1]?top2[1].rem:0],['باقي العملاء', D.receivables_remaining-conc/100*D.receivables_remaining]], {width:460,color1:'#ff6b6b',color2:'#4fc3f7'}) : '<p style="color:var(--muted);">لا توجد بيانات كافية</p>'}
      </div>
    </div>
    <div class="section-title"><span class="dot"></span>لمحة عن كل التقارير</div>
    <div class="snapshot-grid">${snapshots.map(([title,val,pid,color])=>`<div class="snap-card" style="--snap-color:${color};" onclick="goToPage('${pid}')"><div class="snap-title">${title}</div><div class="snap-val">${val}</div></div>`).join('')}</div>
    <div class="section-title"><span class="dot"></span>التحليل المالي</div>
    <div class="analysis-box">
      <b>السيولة:</b> نسبة السيولة النقدية ${cashRatio.toFixed(2)}x. <b>تركز العملاء:</b> أكبر عميلين يمثلان ${pct(conc)} من المستحقات. <b>الرواتب:</b> ${D.headcount} موظف بتكلفة شهرية كاملة ${fmt(D.payroll_monthly)} ر.س.
    </div>
  `;
}

function toggleAcc(id) {

function renderIncome() {
  const months = D.isMonthLabels || [];
  const nMonths = months.length;
  function growth(vals) {
    const g = ['—'];
    for (let i=1;i<vals.length;i++) {
      const prev = vals[i-1];
      g.push(prev ? pct((vals[i]-prev)/Math.abs(prev)*100) : '—');
    }
    return g;
  }
  const revGrowth = growth(D.monthlyRevenue||[]);
  function accordionSection(title, items, total, color, idx, openDefault) {
    const rows = items.map(it => {
      const cells = it.monthly.map(v=>`<td class="num muted-td">${fmt(v)}</td>`).join('');
      const pctOfRev = D.is_revenue ? pct(it.total/D.is_revenue*100) : '—';
      const nz = it.monthly.filter(v=>v);
      let g = '—';
      if (nz.length>=2) { const first=nz[0],last=nz[nz.length-1]; g = first ? pct((last-first)/Math.abs(first)*100) : '—'; }
      const gCls = g!=='—' && !g.startsWith('-') ? 'pos' : (g!=='—' ? 'neg' : 'muted-td');
      return `<tr><td>${it.name}</td>${cells}<td class="num pos">${fmt(it.total)}</td><td class="num muted-td">${pctOfRev}</td><td class="num ${gCls}">${g}</td></tr>`;
    }).join('');
    const openCls = openDefault ? ' open' : '';
    return `<div class="accordion-item${openCls}" id="acc-${idx}">
      <div class="accordion-head" onclick="toggleAcc('acc-${idx}')"><span>${title}</span>
        <span style="display:flex;align-items:center;gap:14px;"><span style="color:${color};font-family:'Inter',sans-serif;font-weight:900;direction:ltr;">${fmt(total)} ر.س</span><span class="chev">▾</span></span></div>
      <div class="accordion-body"><div class="accordion-body-inner"><div class="table-scroll"><table>
        <thead><tr><th>البند</th>${months.map(m=>`<th>${m}</th>`).join('')}<th>الإجمالي</th><th>% من الإيراد</th><th>النمو/العجز</th></tr></thead>
        <tbody>${rows}</tbody></table></div></div></div>
    </div>`;
  }
  const netMarginByMonth = (D.monthlyNet||[]).map((n,i)=> D.monthlyRevenue[i] ? n/D.monthlyRevenue[i]*100 : 0);
  return `
    <div class="page-header"><h2>قائمة الدخل</h2><p>INCOME STATMENTS — ${months.join('، ')||'—'}</p></div>
    <div class="kpi-grid">
      <div class="kpi-card blue"><div class="kpi-label">إجمالي الإيرادات</div><div class="kpi-value">${fmt(D.is_revenue)}</div></div>
      <div class="kpi-card orange"><div class="kpi-label">إجمالي التكاليف</div><div class="kpi-value">${fmt(D.is_cogs+D.is_admin)}</div></div>
      <div class="kpi-card green"><div class="kpi-label">صافي الربح</div><div class="kpi-value">${fmt(D.is_net_profit)}</div><div class="kpi-sub">هامش ${pct(D.netMargin)}</div></div>
      <div class="kpi-card purple"><div class="kpi-label">نقطة التعادل</div><div class="kpi-value">${fmt(D.breakeven)}</div></div>
    </div>
    <div class="section-title"><span class="dot"></span>نقطة التعادل — Break-Even Analysis</div>
    <div class="chart-card">
      <div class="charts-row even" style="align-items:center;">
        <div style="display:flex;justify-content:center;">${multiGauge([['نقطة التعادل', D.is_revenue?Math.min(D.breakeven/D.is_revenue*100,100):0, '#00ff9d']], {size:150})}</div>
        <div class="analysis-box" style="margin-bottom:0;">
          <span class="label">المعادلة المستخدمة</span>
          نقطة التعادل = التكاليف الثابتة ÷ نسبة هامش المساهمة<br/>
          نسبة هامش المساهمة = (الإيراد − التكاليف المتغيرة) ÷ الإيراد = ${pct(D.cmRatio*100)}<br/>
          <b>التكاليف المتغيرة (COGS):</b> ${fmt(D.is_cogs)} ر.س<br/>
          <b>التكاليف الثابتة (إدارية):</b> ${fmt(D.is_admin)} ر.س<br/>
          <b style="font-size:15px;">نقطة التعادل = ${fmt(D.breakeven)} ر.س</b><br/>
          <span style="color:var(--muted);font-size:10.5px;">هامش الأمان: ${D.is_revenue?pct((D.is_revenue-D.breakeven)/D.is_revenue*100):'—'}</span>
        </div>
      </div>
    </div>
    <div class="charts-row even">
      <div class="chart-card"><div class="chart-title">مسار الإيراد الشهري</div>${nMonths ? areaGlowChart(months, D.monthlyRevenue, {width:520,height:210}) : '<p style="color:var(--muted);">لا توجد بيانات شهرية</p>'}</div>
      <div class="chart-card"><div class="chart-title">توزيع الإيراد حسب البند</div>${glowBars(D.isRevItems.map(it=>[it.name,it.total]), {width:460})}</div>
    </div>
    <div class="analysis-box">هامش الربح الصافي ${pct(D.netMargin)}، وهامش الربح الإجمالي ${pct(D.grossMargin)} — يعكس بنية تكلفة ${D.grossMargin>70?'خفيفة نسبياً':'متوسطة'}.</div>
    <div class="section-title"><span class="dot"></span>قائمة الدخل الشهرية الملخّصة</div>
    <div class="table-card"><div class="table-scroll"><table>
      <thead><tr><th>البند</th>${months.map(m=>`<th>${m}</th>`).join('')}<th>الإجمالي</th></tr></thead>
      <tbody>
        <tr><td>المبيعات (Revenue)</td>${(D.monthlyRevenue||[]).map(v=>`<td class="num pos">${fmt(v)}</td>`).join('')}<td class="num pos">${fmt(D.is_revenue)}</td></tr>
        <tr><td>التكاليف المباشرة (COGS)</td>${(D.monthlyCogs||[]).map(v=>`<td class="num muted-td">${fmt(v)}</td>`).join('')}<td class="num pos">${fmt(D.is_cogs)}</td></tr>
        <tr><td>مجمل الربح (Gross Profit)</td>${(D.monthlyGross||[]).map(v=>`<td class="num pos">${fmt(v)}</td>`).join('')}<td class="num pos">${fmt(D.is_gross_profit)}</td></tr>
        <tr><td>المصاريف الإدارية</td>${(D.monthlyAdmin||[]).map(v=>`<td class="num muted-td">${fmt(v)}</td>`).join('')}<td class="num pos">${fmt(D.is_admin)}</td></tr>
        <tr><td>صافي الربح (Net Profit)</td>${(D.monthlyNet||[]).map(v=>`<td class="num pos">${fmt(v)}</td>`).join('')}<td class="num pos">${fmt(D.is_net_profit)}</td></tr>
        <tr><td>نمو المبيعات (%)</td>${revGrowth.map(g=>`<td class="num">${g}</td>`).join('')}<td>—</td></tr>
      </tbody></table></div></div>
    <div class="section-title"><span class="dot"></span>التفصيل الكامل — اضغط لفتح كل قسم</div>
    ${accordionSection('المبيعات (Revenue)', D.isRevItems, D.is_revenue, '#4fc3f7', 1, true)}
    ${accordionSection('التكاليف التشغيلية (COGS)', D.isCogsItems, D.is_cogs, '#ff9f43', 2, false)}
    ${accordionSection('المصاريف الإدارية (Admin Expenses)', D.isAdminItems, D.is_admin, '#ff6b6b', 3, false)}
  `;
}

      <div class="chart-card"><div class="chart-title">أعلى 8 بنود سنوياً</div>${glowBars(rows.slice(0,8).map(r=>[r.label,r.total]), {width:460,color1:'#ff9f43',color2:'#ff6b6b'})}</div>
    </div>
    <div class="table-card"><div class="table-header"><div class="table-title">الجدول الكامل — كل البنود</div></div>
      <div class="table-scroll"><table><thead><tr><th>البند</th><th>الإجمالي السنوي</th></tr></thead>
      <tbody>${rows.map(r=>`<tr><td>${r.label}</td><td class="num pos">${fmt(r.total)}</td></tr>`).join('')}</tbody></table></div></div>
  `;
}
</script>
</body>
</html>
